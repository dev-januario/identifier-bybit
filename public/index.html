<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogeBot Bybit</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 24px;
            background: #121417;
            color: #F5F6F5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: #1A1D22;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-width: 960px;
            width: 100%;
            border: 1px solid #2A2E35;
        }

        h1 {
            font-size: 32px;
            color: #F5F6F5;
            text-align: center;
            margin: 0 0 8px;
        }

        h2 {
            font-size: 20px;
            color: #A0A4AA;
            text-align: center;
            margin: 0 0 24px;
            font-weight: 400;
        }

        h3 {
            font-size: 16px;
            color: #F5F6F5;
            margin: 0 0 12px;
            font-weight: 600;
        }

        .status {
            background: #21252B;
            border: 1px solid #2A2E35;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status span {
            font-weight: 600;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }

        button {
            background: #28A745;
            color: #F5F6F5;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #2ECC71;
            transform: translateY(-1px);
        }

        button.stop-btn {
            background: #D73A49;
        }

        button.stop-btn:hover {
            background: #FF6B6B;
        }

        button.clear-btn {
            background: #4A90E2;
        }

        button.clear-btn:hover {
            background: #5DAEFF;
        }

        #log {
            background: #21252B;
            border: 1px solid #2A2E35;
            padding: 12px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #A0A4AA;
            line-height: 1.5;
        }

        input[type="number"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2A2E35;
            background: #21252B;
            color: #F5F6F5;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="number"]::placeholder {
            color: #6E7681;
        }

        label {
            color: #F5F6F5;
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }

        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            background: #2A2E35;
            color: #F5F6F5;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        .snackbar {
            visibility: hidden;
            min-width: 250px;
            background: #21252B;
            color: #F5F6F5;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        #signal-card {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            border: 2px solid;
            animation: pulse 0.6s ease;
        }

        #signal-card.long {
            background: #0D2B1A;
            border-color: #28A745;
        }

        #signal-card.short {
            background: #2B0D0D;

        }

            }

            }

            }

            margin-bottom: 12px;
        }

            display: grid;

    <script>
        const SYMBOL = 'DOGEUSDT';
        const INTERVAL = '15';
        const BB_PERIOD = 20;
        const BB_STD = 2;
        const RSI_PERIOD = 14;
        const RSI_MAX = 65;
        const RSI_MIN = 35;
        const STOCH_K = 14;
        const STOCH_SLOW_K = 3;
        const STOCH_D = 3;
        const STOCH_MAX = 80;
        const STOCH_MIN = 20;
        const MAX_LEVERAGE = 15;
        const POSITION_SIZE = 50;
        const LONG_TP_PCT = 2.0;
        const LONG_SL_PCT = 1.0;
        const SHORT_TP_PCT = 2.0;
        const SHORT_SL_PCT = 1.0;
        const MIN_AUX = 1;
        const checkInterval = 5 * 60 * 1000;
        const apiKlineUrl = "https://api.bybit.com/v5/market/kline";

        let botInterval = null;
        let isRunning = false;
        let lastSignalTimestamp = null;

        function log(message) {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleString('pt-BR');
            el.innerHTML += `[${ts}] ${message}<br>`;
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            showSnackbar('Log limpo!');
        }

        function updateStatus(s) {
            document.getElementById('status').innerHTML = s;
        }

        function showSnackbar(msg) {
            const sb = document.getElementById('snackbar');
            sb.textContent = msg;
            sb.className = 'snackbar show';
            setTimeout(() => { sb.className = 'snackbar'; }, 3000);
        }

        async function askGemini(direction, price, rsiVal, stochVal, bbStatus, candlePat, auxScore) {
            const dir = direction ? 'LONG (compra)' : 'SHORT (venda)';
            const prompt = `Você é um assistente de trading técnico especializado em criptomoedas. Forneça uma análise objetiva com base nos dados abaixo, seguindo exatamente a estrutura solicitada.

**Contexto da estratégia (Pullback em DOGEUSDT)**
- Timeframe: 15 minutos (Bybit, futuros)
- Gatilhos de entrada:
  - **Compra**: RSI(14) < 35 **e** Estocástico %K(14,3,3) < 20, com preço próximo/abaixo da Banda de Bollinger inferior
  - **Venda**: RSI(14) > 65 **e** Estocástico %K > 80, com preço próximo/acima da Banda de Bollinger superior
- Filtros auxiliares: Padrão de candle de reversão e Pontuação auxiliar (0-100) reforçam o sinal.

**Dados atuais do candle**
- Direção da entrada sugerida: ${dir}   // "COMPRA" ou "VENDA"
- Preço atual: ${price.toFixed(6)} USDT
- RSI(14): ${rsiVal.toFixed(2)}
- Estocástico %K: ${stochVal.toFixed(2)}
- Posição nas Bandas de Bollinger: ${bbStatus}   // ex.: "tocou banda inferior", "banda superior", "entre as bandas"
- Padrão de candle detectado: ${candlePat || 'Nenhum'}
- Pontuação auxiliar (0-100): ${auxScore}   // consolida múltiplos fatores técnicos

**Tarefa** (responda em português, máximo 5 frases, com o formato exato abaixo):

1. **Ação**: [COMPRAR / VENDER / AGUARDAR]
2. **Confiança**: [BAIXA / MÉDIA / ALTA]
3. **Justificativa**: (1-2 frases mencionando a confluência ou divergência dos indicadores, e se o padrão de candle e a pontuação auxiliar reforçam ou enfraquecem o sinal)
4. **Riscos**: (1 frase com o principal ponto de atenção, ex.: divergência de volume, resistência próxima, estocástico ainda caindo)
5. **Gestão sugerida**: Stop loss em [valor] USDT (método: abaixo/ acima da mínima/máxima do candle de sinal ou da banda) | Take profit parcial em [valor] USDT (ex.: banda oposta ou resistência/suporte).

Exemplo de resposta esperada (com dados hipotéticos):
1. Ação: COMPRAR
2. Confiança: MÉDIA
3. Justificativa: RSI sobrevendido e martelo na banda inferior, com estocástico virando e pontuação auxiliar alta (75). O contexto de tendência ainda é baixista, o que reduz a confiança.
4. Riscos: Forte pressão vendedora pode romper a banda inferior sem reação.
5. Gestão sugerida: Stop loss em 0.1548 USDT (abaixo do martelo) | Take profit parcial em 0.1630 USDT (banda do meio).`;

            const body = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 300, temperature: 0.3 }
            };

            const res = await fetch(GEMINI_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok) throw new Error(`Gemini HTTP ${res.status}`);
            const json = await res.json();
            return json.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'Sem resposta da IA.';
        }

        function showAiLoading() {
            const box = document.getElementById('ai-analysis');
            box.style.display = 'block';
            box.classList.add('loading');
            document.getElementById('ai-text').textContent = 'Consultando Gemini...';
        }

        function showAiResult(text) {
            const box = document.getElementById('ai-analysis');
            box.classList.remove('loading');
            document.getElementById('ai-text').textContent = text;
        }

        function hideAiAnalysis() {
            document.getElementById('ai-analysis').style.display = 'none';
        }

        function playAlert(isLong) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const freqs = isLong ? [660, 880] : [440, 330];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.25);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.4);
                    osc.start(ctx.currentTime + i * 0.25);
                    osc.stop(ctx.currentTime + i * 0.25 + 0.4);
                });
            } catch (e) {
                // AudioContext pode ser bloqueado antes de interação do usuário
            }
        }

        function showSignalCard(isLong, price, rsi, stochK, bbLabel, candleLabel) {
            const card = document.getElementById('signal-card');
            card.className = 'signal-card ' + (isLong ? 'long' : 'short');
            card.style.display = 'block';

            const bankInput = document.getElementById('bankValue').value;
            const bank = (bankInput && Number(bankInput) > 0) ? Number(bankInput) : 100;
            const entrada = bank * (POSITION_SIZE / 100);
            const tpPct = isLong ? LONG_TP_PCT : SHORT_TP_PCT;
            const slPct = isLong ? LONG_SL_PCT : SHORT_SL_PCT;
            const tpPrice = isLong
                ? (price * (1 + tpPct / 100)).toFixed(6)
                : (price * (1 - tpPct / 100)).toFixed(6);
            const slPrice = isLong
                ? (price * (1 - slPct / 100)).toFixed(6)
                : (price * (1 + slPct / 100)).toFixed(6);

            const rsiDist = isLong ? (RSI_MIN - rsi) : (rsi - RSI_MAX);
            const leverage = Math.min(MAX_LEVERAGE, rsiDist > 5 ? MAX_LEVERAGE : 10);

            document.getElementById('signal-title').textContent =
                isLong ? '🟢 ENTRADA LONG (COMPRA)' : '🔴 ENTRADA SHORT (VENDA)';
            document.getElementById('sig-symbol').textContent = SYMBOL;
            document.getElementById('sig-entry').textContent = price.toFixed(6);
            document.getElementById('sig-leverage').textContent = leverage + 'x';
            document.getElementById('sig-size').textContent = POSITION_SIZE + '%  ($' + entrada.toFixed(2) + ')';
            document.getElementById('sig-tp').textContent = (isLong ? '+' : '-') + tpPct + '%  (~' + tpPrice + ')';
            document.getElementById('sig-sl').textContent = (isLong ? '-' : '+') + slPct + '%  (~' + slPrice + ')';
            document.getElementById('sig-rsi').textContent = rsi.toFixed(2);
            document.getElementById('sig-stoch').textContent = stochK.toFixed(2);
            document.getElementById('sig-bb').textContent = bbLabel;
            document.getElementById('sig-candle').textContent = candleLabel || '—';
        }

        function hideSignalCard() {
            document.getElementById('signal-card').style.display = 'none';
        }

        async function fetchKlineData(symbol, interval, limit = 200) {
            const params = new URLSearchParams({ category: 'linear', symbol, interval, limit: String(limit) });
            try {
                const res = await fetch(`${apiKlineUrl}?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.retCode !== 0) throw new Error(json.retMsg);
                return json.result.list.map(item => ({
                    time: Number(item[0]),
                    open: Number(item[1]),
                    high: Number(item[2]),
                    low: Number(item[3]),
                    close: Number(item[4]),
                    volume: Number(item[5])
                })).reverse();
            } catch (err) {
                log(`❌ Erro ao buscar dados: ${err.message}`);
                return [];
            }
        }

        function bollingerBands(closes, period, stdMultiplier) {
            const upper = [], middle = [], lower = [];
            for (let i = period - 1; i < closes.length; i++) {
                const slice = closes.slice(i - period + 1, i + 1);
                const mean = slice.reduce((a, b) => a + b, 0) / period;
                const vari = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
                const sd = Math.sqrt(vari);
                upper.push(mean + stdMultiplier * sd);
                middle.push(mean);
                lower.push(mean - stdMultiplier * sd);
            }
            return { upper, middle, lower };
        }

        function rsi(closes, period) {
            const gains = [], losses = [];
            for (let i = 1; i < closes.length; i++) {
                const d = closes[i] - closes[i - 1];
                gains.push(d > 0 ? d : 0);
                losses.push(d < 0 ? -d : 0);
            }
            let avgG = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let avgL = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const vals = [avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL)];
            for (let i = period; i < gains.length; i++) {
                avgG = (avgG * (period - 1) + gains[i]) / period;
                avgL = (avgL * (period - 1) + losses[i]) / period;
                vals.push(avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL));
            }
            return vals;
        }

        function sma(data, period) {
            const out = [];
            for (let i = 0; i <= data.length - period; i++) {
                const s = data.slice(i, i + period).reduce((a, b) => a + b, 0);
                out.push(s / period);
            }
            return out;
        }

        function stochastic(highs, lows, closes, kPeriod, kSlowing, dPeriod) {
            const k = [];
            for (let i = kPeriod - 1; i < closes.length; i++) {
                const ll = Math.min(...lows.slice(i - kPeriod + 1, i + 1));
                const hh = Math.max(...highs.slice(i - kPeriod + 1, i + 1));
                k.push(100 * (closes[i] - ll) / (hh - ll || 1));
            }
            const smoothK = sma(k, kSlowing);
            const d = sma(smoothK, dPeriod);
            return { k: smoothK, d };
        }

        function candlePattern(candles) {
            const c = candles[candles.length - 1];
            const p = candles[candles.length - 2];
            const cBody = Math.abs(c.close - c.open);
            const pBody = Math.abs(p.close - p.open);

            if (c.close > c.open && p.close < p.open &&
                c.close > p.open && c.open < p.close && cBody > pBody)
                return 'Engolfo Alta';

            if (c.close < c.open && p.close > p.open &&
                c.close < p.open && c.open > p.close && cBody > pBody)
                return 'Engolfo Baixa';

            if (c.close > c.open &&
                (c.open - c.low) > 2 * cBody &&
                (c.high - c.close) < cBody)
                return 'Martelo';

            if (c.close < c.open &&
                (c.high - c.open) > 2 * cBody &&
                (c.close - c.low) < cBody)
                return 'Estrela Cadente';

            return null;
        }

        function analyzeSignal(candles) {
            if (candles.length < BB_PERIOD + 10) return null;

            const closes = candles.map(c => c.close);
            const highs = candles.map(c => c.high);
            const lows = candles.map(c => c.low);
            const price = closes[closes.length - 1];
            const prevClose = closes[closes.length - 2];

            const bb = bollingerBands(closes, BB_PERIOD, BB_STD);
            const rsiArr = rsi(closes, RSI_PERIOD);
            const stoch = stochastic(highs, lows, closes, STOCH_K, STOCH_SLOW_K, STOCH_D);
            const pat = candlePattern(candles);

            const lastRsi = rsiArr[rsiArr.length - 1];
            const lastStochK = stoch.k[stoch.k.length - 1];
            const lastUpper = bb.upper[bb.upper.length - 1];
            const lastLower = bb.lower[bb.lower.length - 1];
            const prevUpper = bb.upper[bb.upper.length - 2];
            const prevLower = bb.lower[bb.lower.length - 2];
            const lastMiddle = bb.middle[bb.middle.length - 1];
            const aboveUpper = price >= lastUpper;
            const belowLower = price <= lastLower;
            const pullbackFromTop = prevClose >= prevUpper && price < lastUpper;
            const pullbackFromBot = prevClose <= prevLower && price > lastLower;
            const nearUpper = price > lastMiddle && price < lastUpper;
            const nearLower = price < lastMiddle && price > lastLower;

            let bbStatus;
            if (aboveUpper) bbStatus = 'Fora — Acima da Sup';
            else if (belowLower) bbStatus = 'Fora — Abaixo da Inf';
            else if (pullbackFromTop) bbStatus = 'Pullback da Sup ↓';
            else if (pullbackFromBot) bbStatus = 'Pullback da Inf ↑';
            else if (nearUpper) bbStatus = 'Dentro — Próx. Sup';
            else if (nearLower) bbStatus = 'Dentro — Próx. Inf';
            else bbStatus = 'Dentro das Bandas';

            const longRSI = lastRsi < RSI_MIN;
            const shortRSI = lastRsi > RSI_MAX;

            if (!longRSI && !shortRSI) {
                return {
                    isLong: null, price, rsi: lastRsi, stochK: lastStochK,
                    bbLabel: bbStatus, candle: pat, score: 0,
                    reason: `RSI neutro (${lastRsi.toFixed(1)}) | ${bbStatus}`
                };
            }

            let auxScore = 0;
            let bbLabel = bbStatus;

            if (longRSI) {
                if (belowLower) { auxScore++; bbLabel = 'Fora — Abaixo da Inf ✓'; }
                if (pullbackFromBot) { auxScore += 2; bbLabel = 'Pullback da Inf ✓✓'; }
                if (nearLower) { auxScore++; }

                if (lastStochK < STOCH_MIN) auxScore++;

                if (['Engolfo Alta', 'Martelo'].includes(pat)) auxScore++;
            }

            if (shortRSI) {
                if (aboveUpper) { auxScore++; bbLabel = 'Fora — Acima da Sup ✓'; }
                if (pullbackFromTop) { auxScore += 2; bbLabel = 'Pullback da Sup ✓✓'; }
                if (nearUpper) { auxScore++; }

                if (lastStochK > STOCH_MAX) auxScore++;

                if (['Engolfo Baixa', 'Estrela Cadente'].includes(pat)) auxScore++;
            }

            if (auxScore >= MIN_AUX) {
                return {
                    isLong: longRSI, price, rsi: lastRsi, stochK: lastStochK,
                    bbLabel, candle: pat, score: auxScore
                };
            }

            const rsiDir = longRSI ? `Sobrevendido (${lastRsi.toFixed(1)})` : `Sobrecomprado (${lastRsi.toFixed(1)})`;
            return {
                isLong: null, price, rsi: lastRsi, stochK: lastStochK,
                bbLabel, candle: pat, score: auxScore,
                reason: `RSI ${rsiDir} — aguardando confirmação BB/Stoch`
            };
        }

        async function checkSignal() {
            if (!isRunning) return;
            try {
                log(`🔍 Verificando ${SYMBOL}...`);
                const candles = await fetchKlineData(SYMBOL, INTERVAL, 200);
                if (candles.length < BB_PERIOD + 10) {
                    log('❌ Dados insuficientes.'); return;
                }

                const currentTs = candles[candles.length - 1].time;
                if (lastSignalTimestamp === currentTs) {
                    log('⏳ Sinal já processado neste candle.'); return;
                }

                const result = analyzeSignal(candles);
                if (!result) return;

                const bbInfo = result.bbLabel || '—';
                const rsiTag = result.rsi < RSI_MIN ? '🔵 SV' : result.rsi > RSI_MAX ? '🔴 SC' : '⚪';
                log(`📊 Preço: ${result.price.toFixed(6)} | RSI: ${result.rsi.toFixed(2)} ${rsiTag} | Stoch %K: ${result.stochK.toFixed(2)} | BB: ${bbInfo} | Candle: ${result.candle || '—'} | Aux: ${result.score}`);

                if (result.isLong === true || result.isLong === false) {
                    const dir = result.isLong ? 'LONG 🟢' : 'SHORT 🔴';
                    log(`🚀 ENTRADA ${dir} detectada! (RSI + ${result.score} aux)`);
                    showSignalCard(result.isLong, result.price, result.rsi, result.stochK, result.bbLabel, result.candle);
                    playAlert(result.isLong);
                    lastSignalTimestamp = currentTs;

                    showAiLoading();
                    askGemini(result.isLong, result.price, result.rsi, result.stochK, result.bbLabel, result.candle, result.score)
                        .then(text => {
                            showAiResult(text);
                            log(`🤖 Gemini: ${text.replace(/\n/g, ' ')}`);
                        })
                        .catch(err => {
                            showAiResult(`Erro ao consultar IA: ${err.message}`);
                            log(`⚠️ Gemini erro: ${err.message}`);
                        });
                } else {
                    hideSignalCard();
                    hideAiAnalysis();
                    const reason = result.reason || 'RSI neutro';
                    log(`⏳ ${reason}`);
                }
            } catch (err) {
                log(`❌ Erro: ${err.message}`);
            }
        }

        function startBot() {
            if (isRunning) { showSnackbar('Bot já está ativo!'); return; }
            isRunning = true;
            updateStatus('🟢 Ativo — verificando a cada 5 min');
            log('▶️ Bot iniciado! Verificando DOGEUSDT a cada 5 minutos.');
            checkSignal();
            botInterval = setInterval(checkSignal, checkInterval);
            showSnackbar('Bot iniciado!');
        }

        function stopBot() {
            if (!isRunning) { showSnackbar('Bot já está inativo!'); return; }
            isRunning = false;
            clearInterval(botInterval);
            botInterval = null;
            lastSignalTimestamp = null;
            hideSignalCard();
            updateStatus('🔴 Parado');
            log('⏹️ Bot parado.');
            showSnackbar('Bot parado!');
        }

        function checkNow() {
            if (!isRunning) { showSnackbar('Inicie o bot primeiro.'); return; }
            log('🔄 Forçando verificação...');
            lastSignalTimestamp = null;
            checkSignal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('✅ Pronto para iniciar!');
            log('🐶 DogeBot carregado. Estratégia: RSI(14) pullback (<35 long | >65 short) + BB(20,2) + Stoch(14,3,3) como auxiliares');
        });
    </script>
</body>
