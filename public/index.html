    <script>
        // ── Configurações ────────────────────────────────────────────────────────

        const RSI_OVERBOUGHT = 65;       // IFR ≥ 65 → condição de SHORT (sobrecomprado)
        const MAX_LEVERAGE = 15;
        const POSITION_SIZE = 50;
        const checkInterval = 15 * 60 * 1000; // verifica a cada 15 min (candle 1H)
        const SCAN_DELAY_MS = 200;            // pausa entre requisições (ms)

        const apiKlineUrl = "https://api.bybit.com/v5/market/kline";
        const apiInstrumentsUrl = "https://api.bybit.com/v5/market/instruments-info";

        // Telegram
        const TELEGRAM_TOKEN = '8609281623:AAFCFuUFHLteSLgydv3YYmocm7Fil5GRgjo';
        const TELEGRAM_CHAT_ID = '@bybit_alertas_canal';
        const TELEGRAM_URL = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

        let botInterval = null;
        let isRunning = false;
        let isScanning = false;
        let lastSignalTimestamps = {};  // { symbol: timestamp }
        let allSymbols = [];

        // ── UI helpers ───────────────────────────────────────────────────────────

        function showSnackbar(msg) {

        // ── Telegram ─────────────────────────────────────────────────────────────
        async function sendTelegram(text) {
            const res = await fetch(TELEGRAM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text, parse_mode: 'HTML' })
            });
            if (!res.ok) throw new Error(`Telegram HTTP ${res.status}: ${await res.text()}`);
            return res.json();

        function buildTelegramMsg(isLong, symbol, price, rsiVal, tpPrice, slPrice, candlePat, highVolume, bankValue) {
            const dir = isLong ? '🟢 LONG (COMPRA)' : '🔴 SHORT (VENDA)';
            const setup = isLong ? 'Acumulação rompida' : 'Distribuição rompida';
            const rsiLabel = isLong
                ? `IFR(14) esteve sobrevendido → reagindo (${rsiVal.toFixed(1)})`
                : `IFR(14) esteve sobrecomprado → caindo (${rsiVal.toFixed(1)})`;
            const floorLbl = isLong ? 'Fundo respeitado ✅' : 'Topo respeitado ✅';
            const volLbl = highVolume ? '🔥 Volume acima da média' : 'Volume normal';
            const bbTpLabel = isLong ? 'Banda Superior BB(20)' : 'Banda Inferior BB(20)';
            const bbSlLabel = isLong ? 'Banda Inferior BB(20)' : 'Banda Superior BB(20)';
            const entrada = bankValue * (POSITION_SIZE / 100);
            const tpPct = ((Math.abs(tpPrice - price) / price) * 100).toFixed(2);
            const slPct = ((Math.abs(slPrice - price) / price) * 100).toFixed(2);
            const now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const ticker = symbol.replace('USDT', '');

            return `🚨 <b>SINAL DETECTADO — ${symbol} (1H)</b>

${dir}
📅 ${now}

📌 <b>Setup:</b> ${setup}
📉 <b>RSI:</b> ${rsiLabel}
🔲 <b>Estrutura:</b> ${floorLbl}
📦 <b>Volume:</b> ${volLbl}

💵 <b>Entrada:</b> ${price.toFixed(6)} USDT
🎯 <b>TP:</b> ${tpPrice.toFixed(6)} USDT (+${tpPct}%) — ${bbTpLabel}
🛡 <b>SL:</b> ${slPrice.toFixed(6)} USDT (-${slPct}%) — ${bbSlLabel}
💰 <b>Banca:</b> ${POSITION_SIZE}% ($${entrada.toFixed(2)})
⚖️ <b>Alavancagem sugerida:</b> até ${MAX_LEVERAGE}x

📊 <b>Padrão de candle:</b> ${candlePat || 'Nenhum'}

#Bybit #Sinal #${ticker}`;
        }

        function playAlert(isLong) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const freqs = isLong ? [660, 880] : [440, 330];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.25);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.4);
                    osc.start(ctx.currentTime + i * 0.25);
                    osc.stop(ctx.currentTime + i * 0.25 + 0.4);
                });
            } catch (e) { }
        }

        function showSignalCard(isLong, symbol, price, rsi, tpPrice, slPrice, candleLabel) {
            const card = document.getElementById('signal-card');
            card.className = 'signal-card ' + (isLong ? 'long' : 'short');
            card.style.display = 'block';

            const bankInput = document.getElementById('bankValue').value;
            const bank = (bankInput && Number(bankInput) > 0) ? Number(bankInput) : 100;
            const entrada = bank * (POSITION_SIZE / 100);
            const tpPct = ((Math.abs(tpPrice - price) / price) * 100).toFixed(2);
            const slPct = ((Math.abs(slPrice - price) / price) * 100).toFixed(2);

            document.getElementById('signal-title').textContent =
                isLong ? '🟢 LONG — Buscar Entrada de Compra' : '🔴 SHORT — Buscar Entrada de Venda';
            document.getElementById('sig-symbol').textContent = symbol;
            document.getElementById('sig-trend').textContent = isLong
                ? '� Acumulação rompida'
                : '🔴 Distribuição rompida';
            document.getElementById('sig-entry').textContent = price.toFixed(6);
            document.getElementById('sig-leverage').textContent = MAX_LEVERAGE + 'x';
            document.getElementById('sig-size').textContent = POSITION_SIZE + '%  ($' + entrada.toFixed(2) + ')';
            document.getElementById('sig-tp').textContent = `+${tpPct}%  (~${tpPrice.toFixed(6)}) — BB Sup`;
            document.getElementById('sig-sl').textContent = `-${slPct}%  (~${slPrice.toFixed(6)}) — BB Inf`;
            document.getElementById('sig-rsi').textContent = rsi.toFixed(2);
            document.getElementById('sig-candle').textContent = candleLabel || '—';
        }

        function hideSignalCard() {
            document.getElementById('signal-card').style.display = 'none';
        }

        // ── Indicadores ──────────────────────────────────────────────────────────
        function ema(closes, period) {
            if (closes.length < period) return [];
            const k = 2 / (period + 1);
            let val = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const out = [val];
            for (let i = period; i < closes.length; i++) {
                val = closes[i] * k + val * (1 - k);
                out.push(val);
            }
            return out;
        }

        function bollingerBands(closes, period, stdMultiplier) {
            const upper = [], middle = [], lower = [];
            for (let i = period - 1; i < closes.length; i++) {
                const slice = closes.slice(i - period + 1, i + 1);
                const mean = slice.reduce((a, b) => a + b, 0) / period;
                const vari = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
                const sd = Math.sqrt(vari);
                upper.push(mean + stdMultiplier * sd);
                middle.push(mean);
                lower.push(mean - stdMultiplier * sd);
            }
            return { upper, middle, lower };
        }

        function rsi(closes, period) {
            const gains = [], losses = [];
            for (let i = 1; i < closes.length; i++) {
                const d = closes[i] - closes[i - 1];
                gains.push(d > 0 ? d : 0);
                losses.push(d < 0 ? -d : 0);
            }
            let avgG = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let avgL = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const vals = [avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL)];
            for (let i = period; i < gains.length; i++) {
                avgG = (avgG * (period - 1) + gains[i]) / period;
                avgL = (avgL * (period - 1) + losses[i]) / period;
                vals.push(avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL));
            }
            return vals;
        }

        function candlePattern(candles) {
            const c = candles[candles.length - 1];
            const p = candles[candles.length - 2];
            const cBody = Math.abs(c.close - c.open);
            const pBody = Math.abs(p.close - p.open);

            if (c.close > c.open && p.close < p.open &&
                c.close > p.open && c.open < p.close && cBody > pBody)
                return 'Engolfo Alta';
            if (c.close < c.open && p.close > p.open &&
                c.close < p.open && c.open > p.close && cBody > pBody)
                return 'Engolfo Baixa';
            if (c.close > c.open &&
                (c.open - c.low) > 2 * cBody &&
                (c.high - c.close) < cBody)
                return 'Martelo';
            if (c.close < c.open &&
                (c.high - c.open) > 2 * cBody &&
                (c.close - c.low) < cBody)
                return 'Estrela Cadente';
            return null;
        }

        // ── Análise principal: Acumulação / Distribuição + Rompimento ───────────────────
        //
        // SINAL LONG — todos devem ser verdadeiros:
        //   1. RSI inteligente : RSI < 35 em algum dos últimos 5 candles E RSI subindo
        //   2. Fundo segurando : últimos 4 candles não romperam a mínima de referência
        //   3. Consolidação    : range médio dos últimos 5 candles < 65% da média de 20
        //   4. Rompimento      : candle atual fecha acima da máxima dos 5 candles anteriores
        //   Bônus              : volume atual > 120% da média dos últimos 20 candles
        //
        // SINAL SHORT — todos devem ser verdadeiros:
        //   1. RSI inteligente : RSI > 65 em algum dos últimos 5 candles E RSI caindo
        //   2. Topo segurando  : últimos 4 candles não romperam a máxima de referência
        //   3. Consolidação    : range médio dos últimos 5 candles < 65% da média de 20
        //   4. Rompimento      : candle atual fecha abaixo da mínima dos 5 candles anteriores
        //   Bônus              : volume atual > 120% da média dos últimos 20 candles
        //
        // TP/SL via Bollinger Bands(20,2) — usado apenas para alvos, não como gatilho:
        //   LONG:  TP = banda superior | SL = banda inferior
        //   SHORT: TP = banda inferior | SL = banda superior
        function analyzeSignal(candles) {
            const minLen = 40; // mínimo confortável para todos os cálculos
            if (candles.length < minLen) return null;

            const closes = candles.map(c => c.close);
            const highs = candles.map(c => c.high);
            const lows = candles.map(c => c.low);
            const volumes = candles.map(c => c.volume);
            const cur = candles[candles.length - 1]; // candle atual (fechado)

            // ── 1. IFR(14) inteligente ───────────────────────────────────────
            const rsiArr = rsi(closes, RSI_PERIOD);
            if (rsiArr.length < 6) return null;
            const lastRsi = rsiArr[rsiArr.length - 1];
            const prevRsi = rsiArr[rsiArr.length - 2];
            const recent5Rsi = rsiArr.slice(-6, -1); // 5 valores antes do atual
            const rsiWasOversold = recent5Rsi.some(r => r < RSI_OVERSOLD);   // esteve sobrevendido
            const rsiWasOverbought = recent5Rsi.some(r => r > RSI_OVERBOUGHT); // esteve sobrecomprado
            const rsiRising = lastRsi > prevRsi; // RSI subindo
            const rsiFalling = lastRsi < prevRsi; // RSI caindo

            // ── 2. Fundo / Topo segurando ──────────────────────────────────
            // Referência: janela de 10 candles anterior à janela de holding
            const refLow = Math.min(...lows.slice(-15, -5));  // piso de referência
            const refHigh = Math.max(...highs.slice(-15, -5)); // teto de referência
            const holdLows = lows.slice(-5, -1);              // 4 candles antes do atual
            const holdHighs = highs.slice(-5, -1);
            const bottomHolding = holdLows.every(l => l >= refLow);   // fundo não cedeu
            const topHolding = holdHighs.every(h => h <= refHigh); // topo não foi rompido

            // ── 3. Consolidação (mercado comprimido) ──────────────────────────
            const recentRanges = candles.slice(-6, -1).map(c => c.high - c.low);
            const avgRecentRange = recentRanges.reduce((a, b) => a + b, 0) / recentRanges.length;
            const longRanges = candles.slice(-21, -1).map(c => c.high - c.low);
            const avgLongRange = longRanges.reduce((a, b) => a + b, 0) / longRanges.length;
            const isConsolidating = avgRecentRange <= avgLongRange * 0.65; // 65% da média histórica

            // ── 4. Rompimento (candle atual vs extremos da consolidação) ─────────
            const prev5High = Math.max(...highs.slice(-6, -1));
            const prev5Low = Math.min(...lows.slice(-6, -1));
            const breakoutUp = cur.close > prev5High; // fecha acima da consolidação
            const breakoutDown = cur.close < prev5Low;  // fecha abaixo da consolidação

            // ── 5. Volume bônus ──────────────────────────────────────────
            const avgVol = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
            const highVolume = cur.volume > avgVol * 1.2; // 20% acima da média

            // ── Bollinger Bands — apenas para TP/SL ─────────────────────────
            const bb = bollingerBands(closes, BB_PERIOD, BB_STD);
            const bbUpper = bb.upper[bb.upper.length - 1];
            const bbLower = bb.lower[bb.lower.length - 1];

            const pat = candlePattern(candles);

            // ── SINAL LONG: acumulação rompida para cima ──────────────────
            if (rsiWasOversold && rsiRising && bottomHolding && isConsolidating && breakoutUp) {
                return {
                    isLong: true, price: cur.close, rsi: lastRsi,
                    tpPrice: bbUpper, slPrice: bbLower,
                    candle: pat, highVolume
                };
            }

            // ── SINAL SHORT: distribuição rompida para baixo ─────────────────
            if (rsiWasOverbought && rsiFalling && topHolding && isConsolidating && breakoutDown) {
                return {
                    isLong: false, price: cur.close, rsi: lastRsi,
                    tpPrice: bbLower, slPrice: bbUpper,
                    candle: pat, highVolume
                };
            }

            return {
                isLong: null, price: cur.close, rsi: lastRsi,
                reason: `IFR: ${lastRsi.toFixed(1)} | Consol: ${isConsolidating} | BreakUp: ${breakoutUp} | BreakDn: ${breakoutDown}`
            };
        }

        // ── Dados ────────────────────────────────────────────────────────────────
        async function fetchAllUsdtSymbols() {
            try {
                const params = new URLSearchParams({ category: 'linear', status: 'Trading', limit: '1000' });
                const res = await fetch(`${apiInstrumentsUrl}?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.retCode !== 0) throw new Error(json.retMsg);
                return json.result.list
                    .filter(s => s.symbol.endsWith('USDT'))
                    .map(s => s.symbol)
                    .sort();
            } catch (err) {
                log(`❌ Erro ao buscar lista de ativos: ${err.message}`);
                return [];
            }
        }

        async function fetchKlineData(symbol, interval, limit = 200) {
            const params = new URLSearchParams({ category: 'linear', symbol, interval, limit: String(limit) });
            try {
                const res = await fetch(`${apiKlineUrl}?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.retCode !== 0) throw new Error(json.retMsg);
                return json.result.list.map(item => ({
                    time: Number(item[0]),
                    open: Number(item[1]),
                    high: Number(item[2]),
                    low: Number(item[3]),
                    close: Number(item[4]),
                    volume: Number(item[5])
                })).reverse();
            } catch (_) {
                return [];
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ── Loop principal ───────────────────────────────────────────────────────
        async function checkSignal() {
            if (!isRunning) return;
            if (isScanning) {
                log('⏳ Varredura anterior ainda em andamento, aguardando...');
                return;
            }
            isScanning = true;
            try {
                if (allSymbols.length === 0) {
                    log('🔄 Buscando lista de ativos USDT...');
                    allSymbols = await fetchAllUsdtSymbols();
                    if (allSymbols.length === 0) { isScanning = false; return; }
                    log(`✅ ${allSymbols.length} ativos carregados.`);
                }

                let found = 0;
                for (let i = 0; i < allSymbols.length; i++) {
                    if (!isRunning) break;
                    const symbol = allSymbols[i];
                    updateStatus(`🔍 Escaneando ${i + 1}/${allSymbols.length} — ${symbol}`);

                    const candles = await fetchKlineData(symbol, INTERVAL, 250);
                    if (candles.length < 120) { await delay(SCAN_DELAY_MS); continue; }

                    const currentTs = candles[candles.length - 1].time;
                    // evita re-alertar no mesmo candle para o mesmo ativo
                    if (lastSignalTimestamps[symbol] === currentTs) { await delay(SCAN_DELAY_MS); continue; }

                    const result = analyzeSignal(candles);
                    if (!result) { await delay(SCAN_DELAY_MS); continue; }

                    if (result.isLong === true || result.isLong === false) {
                        const dir = result.isLong ? 'LONG 🟢' : 'SHORT 🔴';
                        const setupLbl = result.isLong ? 'Acumulação rompida' : 'Distribuição rompida';
                        const rsiLbl = result.isLong ? 'RSI reagindo' : 'RSI caindo';
                        const floorLbl = result.isLong ? 'Fundo respeitado' : 'Topo respeitado';
                        const volLbl = result.highVolume ? ' | 🔥 Volume alto' : '';
                        log(`🚀 ${symbol} — ${dir} | ${setupLbl} | ${rsiLbl} | ${floorLbl}${volLbl} | TP: ${result.tpPrice.toFixed(6)} | SL: ${result.slPrice.toFixed(6)}`);
                        showSignalCard(result.isLong, symbol, result.price, result.rsi, result.tpPrice, result.slPrice, result.candle);
                        playAlert(result.isLong);
                        lastSignalTimestamps[symbol] = currentTs;
                        found++;

                        const bankInput = document.getElementById('bankValue').value;
                        const bank = (bankInput && Number(bankInput) > 0) ? Number(bankInput) : 100;
                        const tgMsg = buildTelegramMsg(result.isLong, symbol, result.price, result.rsi, result.tpPrice, result.slPrice, result.candle, result.highVolume, bank);
                        sendTelegram(tgMsg)
                            .then(() => log(`📬 Sinal de ${symbol} enviado para o Telegram!`))
                            .catch(err => log(`⚠️ Telegram erro (${symbol}): ${err.message}`));
                    }

                    await delay(SCAN_DELAY_MS);
                }

                if (isRunning) {
                    const hora = new Date().toLocaleTimeString('pt-BR');
                    updateStatus(`🟢 Ativo — ${allSymbols.length} ativos | Última varredura: ${hora}`);
                    log(`✅ Varredura concluída — ${allSymbols.length} ativos | Sinais encontrados: ${found}`);
                }
            } catch (err) {
                log(`❌ Erro: ${err.message}`);
            } finally {
                isScanning = false;
            }
        }

        // ── Controles ────────────────────────────────────────────────────────────
        function setBtnState(running) {
            document.getElementById('start-btn').disabled = running;
            document.getElementById('stop-btn').disabled = !running;
        }

        function startBot() {
            isRunning = true;
            setBtnState(true);
            updateStatus('🟢 Ativo — iniciando varredura...');
            log('▶️ Bot iniciado! Monitorando todos os ativos USDT (1H) — Acumulação/Distribuição + RSI + Rompimento.');
            checkSignal();
            botInterval = setInterval(checkSignal, checkInterval);
            showSnackbar('Bot iniciado!');
        }

        function stopBot() {
            isRunning = false;
            clearInterval(botInterval);
            botInterval = null;
            isScanning = false;
            lastSignalTimestamps = {};
            allSymbols = [];
            setBtnState(false);
            hideSignalCard();
            updateStatus('🔴 Parado');
            log('⏹️ Bot parado.');
            showSnackbar('Bot parado!');
        }

        function checkNow() {
            if (!isRunning) { showSnackbar('Inicie o bot primeiro.'); return; }
            log('🔄 Forçando verificação...');
            lastSignalTimestamps = {};
            checkSignal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setBtnState(false);
            updateStatus('✅ Pronto para iniciar!');
            log('📊 Bot carregado. Estratégia: Acumulação/Distribuição + RSI Inteligente + Rompimento (1H)');
            log('ℹ️  LONG : RSI sobrevendido → reagindo | Fundo segurando | Consolidação | Rompe máxima');
            log('ℹ️  SHORT: RSI sobrecomprado → caindo  | Topo segurando  | Consolidação | Rompe mínima');
            log('📐 TP = BB Superior | SL = BB Inferior (Bollinger 20,2)');
        });
    </script>
</body>
