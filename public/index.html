    <script>

        const apiInstrumentsUrl = "https://api.bybit.com/v5/market/instruments-info";

        // Telegram
        const TELEGRAM_TOKEN = '8609281623:AAFCFuUFHLteSLgydv3YYmocm7Fil5GRgjo';
        const TELEGRAM_CHAT_ID = '@bybit_alertas_canal';

        // ── UI helpers ───────────────────────────────────────────────────────────

        // ── Telegram ─────────────────────────────────────────────────────────────
        async function sendTelegram(text) {

                method: 'POST',

        function buildTelegramMsg(isLong, symbol, price, rsiVal, tpPrice, slPrice, candlePat, rsiBonus, retracePct, bankValue) {
            const dir = isLong ? '🟢 LONG (COMPRA)' : '🔴 SHORT (VENDA)';
            const trendLbl = isLong ? '📈 Alta — HH/HL + preço acima da EMA21' : '📉 Baixa — LH/LL + preço abaixo da EMA21';
            const setupLbl = isLong
                ? 'Pullback em tendência de alta — Rompimento da retomada'

            const rsiLbl = isLong
                ? `IFR(14) em ganho de força (${rsiVal.toFixed(1)})`
                : `IFR(14) em perda de força (${rsiVal.toFixed(1)})`;
            const bonusLbl = rsiBonus ? '✅ IFR favorável' : '⚠️ IFR neutro';
            const bbTpLabel = isLong ? 'BB Superior (20,2) / RR 2:1' : 'BB Inferior (20,2) / RR 2:1';
            const bbSlLabel = isLong ? 'Fundo do pullback' : 'Topo do pullback';
            const entrada = bankValue * (POSITION_SIZE / 100);
            const tpPct = ((Math.abs(tpPrice - price) / price) * 100).toFixed(2);
            const slPct = ((Math.abs(slPrice - price) / price) * 100).toFixed(2);
            const now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const ticker = symbol.replace('USDT', '');

            return `🚨 <b>SMC PULLBACK — ${symbol} (1H)</b>

${dir}
📅 ${now}

📌 <b>Setup:</b> ${setupLbl}
📊 <b>Tendência:</b> ${trendLbl}
🔄 <b>Retração:</b> ${retracePct}% do impulso
📉 <b>IFR(14):</b> ${rsiLbl}
📊 <b>Bônus:</b> ${bonusLbl}

💵 <b>Entrada:</b> ${price.toFixed(6)} USDT
🎯 <b>TP:</b> ${tpPrice.toFixed(6)} USDT (+${tpPct}%) — ${bbTpLabel}
🛡 <b>SL:</b> ${slPrice.toFixed(6)} USDT (-${slPct}%) — ${bbSlLabel}
💰 <b>Banca:</b> ${POSITION_SIZE}% ($${entrada.toFixed(2)})
⚖️ <b>Alavancagem sugerida:</b> até ${MAX_LEVERAGE}x

📊 <b>Padrão de candle:</b> ${candlePat || 'Nenhum'}

#Bybit #SMCPullback #${ticker}`;
        }

        function playAlert(isLong) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const freqs = isLong ? [660, 880] : [440, 330];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.25);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.4);
                    osc.start(ctx.currentTime + i * 0.25);
                    osc.stop(ctx.currentTime + i * 0.25 + 0.4);
                });
            } catch (e) { }
        }

        function showSignalCard(isLong, symbol, price, rsi, tpPrice, slPrice, candleLabel) {
            const card = document.getElementById('signal-card');
            card.className = 'signal-card ' + (isLong ? 'long' : 'short');
            card.style.display = 'block';

            const bankInput = document.getElementById('bankValue').value;
            const bank = (bankInput && Number(bankInput) > 0) ? Number(bankInput) : 100;
            const entrada = bank * (POSITION_SIZE / 100);
            const tpPct = ((Math.abs(tpPrice - price) / price) * 100).toFixed(2);
            const slPct = ((Math.abs(slPrice - price) / price) * 100).toFixed(2);

            document.getElementById('signal-title').textContent =
                isLong ? '🟢 LONG — Buscar Entrada de Compra' : '🔴 SHORT — Buscar Entrada de Venda';
            document.getElementById('sig-symbol').textContent = symbol;
            document.getElementById('sig-trend').textContent = isLong
                ? '📈 SMC Pullback Alta'
                : '📉 SMC Pullback Baixa';
            document.getElementById('sig-entry').textContent = price.toFixed(6);
            document.getElementById('sig-leverage').textContent = MAX_LEVERAGE + 'x';
            document.getElementById('sig-size').textContent = POSITION_SIZE + '%  ($' + entrada.toFixed(2) + ')';
            document.getElementById('sig-tp').textContent = `+${tpPct}%  (~${tpPrice.toFixed(6)}) — BB Sup`;
            document.getElementById('sig-sl').textContent = `-${slPct}%  (~${slPrice.toFixed(6)}) — BB Inf`;
            document.getElementById('sig-rsi').textContent = rsi.toFixed(2);

        }

        function hideSignalCard() {
            document.getElementById('signal-card').style.display = 'none';
        }

        // ── Indicadores ──────────────────────────────────────────────────────────
        function ema(closes, period) {
            if (closes.length < period) return [];
            const k = 2 / (period + 1);
            let val = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const out = [val];
            for (let i = period; i < closes.length; i++) {
                val = closes[i] * k + val * (1 - k);
                out.push(val);
            }
            return out;
        }

        function bollingerBands(closes, period, stdMultiplier) {
            const upper = [], middle = [], lower = [];
            for (let i = period - 1; i < closes.length; i++) {
                const slice = closes.slice(i - period + 1, i + 1);
                const mean = slice.reduce((a, b) => a + b, 0) / period;
                const vari = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
                const sd = Math.sqrt(vari);
                upper.push(mean + stdMultiplier * sd);
                middle.push(mean);
                lower.push(mean - stdMultiplier * sd);
            }
            return { upper, middle, lower };
        }

        function rsi(closes, period) {
            const gains = [], losses = [];
            for (let i = 1; i < closes.length; i++) {
                const d = closes[i] - closes[i - 1];
                gains.push(d > 0 ? d : 0);
                losses.push(d < 0 ? -d : 0);
            }
            let avgG = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let avgL = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const vals = [avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL)];
            for (let i = period; i < gains.length; i++) {
                avgG = (avgG * (period - 1) + gains[i]) / period;
                avgL = (avgL * (period - 1) + losses[i]) / period;
                vals.push(avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL));
            }
            return vals;
        }

        function candlePattern(candles) {
            const c = candles[candles.length - 1];
            const p = candles[candles.length - 2];
            const cBody = Math.abs(c.close - c.open);
            const pBody = Math.abs(p.close - p.open);

            if (c.close > c.open && p.close < p.open &&
                c.close > p.open && c.open < p.close && cBody > pBody)
                return 'Engolfo Alta';
            if (c.close < c.open && p.close > p.open &&
                c.close < p.open && c.open > p.close && cBody > pBody)
                return 'Engolfo Baixa';
            if (c.close > c.open &&
                (c.open - c.low) > 2 * cBody &&
                (c.high - c.close) < cBody)
                return 'Martelo';
            if (c.close < c.open &&
                (c.high - c.open) > 2 * cBody &&
                (c.close - c.low) < cBody)
                return 'Estrela Cadente';
            return null;
        }

        // ── Pontos de swing (HH / HL / LH / LL) ───────────────────────────────
        // Swing high: máxima maior que 'lookback' vizinhos em cada lado.
        // Swing low : mínima menor que 'lookback' vizinhos em cada lado.
        // Os últimos 'lookback' candles não são considerados (ainda não confirmados).
        function findSwings(highs, lows, lookback = 3) {
            const swingHighs = [];
            const swingLows = [];
            const limit = highs.length - lookback;
            for (let i = lookback; i < limit; i++) {
                const leftH = highs.slice(i - lookback, i);
                const rightH = highs.slice(i + 1, i + lookback + 1);
                if (leftH.every(h => h <= highs[i]) && rightH.every(h => h <= highs[i])) {
                    swingHighs.push({ index: i, price: highs[i] });
                }
                const leftL = lows.slice(i - lookback, i);
                const rightL = lows.slice(i + 1, i + lookback + 1);
                if (leftL.every(l => l >= lows[i]) && rightL.every(l => l >= lows[i])) {
                    swingLows.push({ index: i, price: lows[i] });
                }
            }
            return { swingHighs, swingLows };
        }

        // ── Análise principal: SMC Pullback ──────────────────────────────────
        //
        // SINAL LONG — todos devem ser verdadeiros:
        //   1. Tendência de alta : HH + HL nos swing points recentes | preço > EMA21
        //   2. Impulso anterior  : último swing high mais recente que o último swing low
        //   3. Pullback saudável: recuo de 30–65% do impulso sem romper a estrutura
        //   4. Gatilho de entrada: fechamento acima da máxima do candle anterior
        //   Bônus               : IFR em ganho de força
        //
        // SINAL SHORT — todos devem ser verdadeiros:
        //   1. Tendência de baixa: LH + LL nos swing points recentes | preço < EMA21
        //   2. Impulso anterior  : último swing low mais recente que o último swing high
        //   3. Pullback saudável: recuo de 30–65% do impulso sem romper a estrutura
        //   4. Gatilho de entrada: fechamento abaixo da mínima do candle anterior
        //   Bônus               : IFR em perda de força
        //
        // TP : Banda BB oposta (20,2) ou RR 2:1 — o que for mais distante do entry
        // SL : Fundo/Topo do pullback
        function analyzeSignal(candles) {
            const minLen = 60;
            if (candles.length < minLen) return null;

            const closes = candles.map(c => c.close);
            const cur = candles[candles.length - 1]; // candle atual (fechado)
            const prev = candles[candles.length - 2]; // candle anterior

            // Janela de trabalho: últimos 60 candles para detecção de swings
            const wCandles = candles.slice(-60);
            const wHighs = wCandles.map(c => c.high);
            const wLows = wCandles.map(c => c.low);

            // ── Swing points ──
            const { swingHighs, swingLows } = findSwings(wHighs, wLows, 3);
            if (swingHighs.length < 2 || swingLows.length < 2) return null;

            const lastSH = swingHighs[swingHighs.length - 1]; // swing high mais recente
            const prev2SH = swingHighs[swingHighs.length - 2]; // swing high anterior
            const lastSL = swingLows[swingLows.length - 1];   // swing low mais recente
            const prev2SL = swingLows[swingLows.length - 2];   // swing low anterior

            // ── EMA21 (filtro secundário) ──
            const ema21Arr = ema(closes, EMA_FILTER_PERIOD);
            const lastEma21 = ema21Arr[ema21Arr.length - 1];

            // ── Estrutura de mercado: HH/HL (alta) ou LH/LL (baixa) ──
            const isHHHL = lastSH.price > prev2SH.price && lastSL.price > prev2SL.price;
            const isLHLL = lastSH.price < prev2SH.price && lastSL.price < prev2SL.price;

            const isUpTrend = isHHHL && cur.close > lastEma21;
            const isDownTrend = isLHLL && cur.close < lastEma21;

            // ── Indicadores auxiliares (TP/SL e bônus) ──
            const bb = bollingerBands(closes, BB_PERIOD, BB_STD);
            const bbUpper = bb.upper[bb.upper.length - 1];
            const bbLower = bb.lower[bb.lower.length - 1];
            const rsiArr = rsi(closes, RSI_PERIOD);
            const lastRsi = rsiArr[rsiArr.length - 1];
            const prevRsi = rsiArr.length > 1 ? rsiArr[rsiArr.length - 2] : lastRsi;
            const pat = candlePattern(candles);

            // ── SINAL LONG ───────────────────────────────────────────────
            // Último impulso foi para cima: lastSH deve ser mais recente que lastSL
            if (isUpTrend && lastSH.index > lastSL.index) {
                const impulseLow = lastSL.price;
                const impulseHigh = lastSH.price;
                const impulseLeg = impulseHigh - impulseLow;
                if (impulseLeg <= 0) return null;

                // Candles do pullback: entre o swing high e o candle atual (exclusive)
                const afterSH = wCandles.slice(lastSH.index + 1, -1);
                if (afterSH.length < 1) return { isLong: null, rsi: lastRsi, reason: 'Aguardando pullback' };

                const pullbackLow = Math.min(...afterSH.map(c => c.low));
                const retrace = (impulseHigh - pullbackLow) / impulseLeg;
                const inZone = retrace >= 0.30 && retrace <= 0.65;

                // Estrutura preservada: pullback não cedeu o swing low (impulso intacto)
                const structureOK = pullbackLow > impulseLow;

                // Gatilho: fechamento acima da máxima do candle anterior
                const breakout = cur.close > prev.high;

                if (inZone && structureOK && breakout) {
                    const slPrice = pullbackLow;
                    const risk = cur.close - slPrice;
                    if (risk <= 0) return null;
                    const rrTP = cur.close + 2 * risk;                         // RR 2:1
                    const tpPrice = bbUpper > cur.close ? Math.max(bbUpper, rrTP) : rrTP;

                    return {
                        isLong: true, price: cur.close, rsi: lastRsi,
                        tpPrice, slPrice, candle: pat,
                        rsiBonus: lastRsi > prevRsi,
                        retracePct: Math.round(retrace * 100)
                    };
                }
            }

            // ── SINAL SHORT ───────────────────────────────────────────────
            // Último impulso foi para baixo: lastSL deve ser mais recente que lastSH
            if (isDownTrend && lastSL.index > lastSH.index) {
                const impulseHigh = lastSH.price;
                const impulseLow = lastSL.price;
                const impulseLeg = impulseHigh - impulseLow;
                if (impulseLeg <= 0) return null;

                // Candles do pullback: entre o swing low e o candle atual (exclusive)
                const afterSL = wCandles.slice(lastSL.index + 1, -1);
                if (afterSL.length < 1) return { isLong: null, rsi: lastRsi, reason: 'Aguardando pullback' };

                const pullbackHigh = Math.max(...afterSL.map(c => c.high));
                const retrace = (pullbackHigh - impulseLow) / impulseLeg;
                const inZone = retrace >= 0.30 && retrace <= 0.65;

                // Estrutura preservada: pullback não superou o swing high (distribuição intacta)
                const structureOK = pullbackHigh < impulseHigh;

                // Gatilho: fechamento abaixo da mínima do candle anterior
                const breakout = cur.close < prev.low;

                if (inZone && structureOK && breakout) {
                    const slPrice = pullbackHigh;
                    const risk = slPrice - cur.close;
                    if (risk <= 0) return null;
                    const rrTP = cur.close - 2 * risk;                          // RR 2:1
                    const tpPrice = bbLower < cur.close ? Math.min(bbLower, rrTP) : rrTP;

                    return {
                        isLong: false, price: cur.close, rsi: lastRsi,
                        tpPrice, slPrice, candle: pat,
                        rsiBonus: lastRsi < prevRsi,
                        retracePct: Math.round(retrace * 100)
                    };
                }
            }

            return {
                isLong: null, price: cur.close, rsi: lastRsi,
                reason: `Tendência: ${isUpTrend ? 'alta' : isDownTrend ? 'baixa' : 'indefinida'} | IFR: ${lastRsi.toFixed(1)}`
            };
        }

        // ── Dados ────────────────────────────────────────────────────────────────
        async function fetchAllUsdtSymbols() {
            try {
                const params = new URLSearchParams({ category: 'linear', status: 'Trading', limit: '1000' });
                const res = await fetch(`${apiInstrumentsUrl}?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.retCode !== 0) throw new Error(json.retMsg);
                return json.result.list
                    .filter(s => s.symbol.endsWith('USDT'))
                    .map(s => s.symbol)
                    .sort();
            } catch (err) {
                log(`❌ Erro ao buscar lista de ativos: ${err.message}`);
                return [];
            }
        }

        async function fetchKlineData(symbol, interval, limit = 200) {
            const params = new URLSearchParams({ category: 'linear', symbol, interval, limit: String(limit) });
            try {
                const res = await fetch(`${apiKlineUrl}?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.retCode !== 0) throw new Error(json.retMsg);
                return json.result.list.map(item => ({
                    time: Number(item[0]),
                    open: Number(item[1]),
                    high: Number(item[2]),
                    low: Number(item[3]),
                    close: Number(item[4]),
                    volume: Number(item[5])
                })).reverse();
            } catch (_) {
                return [];
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ── Loop principal ───────────────────────────────────────────────────────
        async function checkSignal() {
            if (!isRunning) return;
            if (isScanning) {
                log('⏳ Varredura anterior ainda em andamento, aguardando...');
                return;
            }
            isScanning = true;
            try {
                if (allSymbols.length === 0) {
                    log('🔄 Buscando lista de ativos USDT...');
                    allSymbols = await fetchAllUsdtSymbols();
                    if (allSymbols.length === 0) { isScanning = false; return; }
                    log(`✅ ${allSymbols.length} ativos carregados.`);
                }

                let found = 0;
                for (let i = 0; i < allSymbols.length; i++) {
                    if (!isRunning) break;
                    const symbol = allSymbols[i];
                    updateStatus(`🔍 Escaneando ${i + 1}/${allSymbols.length} — ${symbol}`);

                    const candles = await fetchKlineData(symbol, INTERVAL, 250);
                    if (candles.length < 120) { await delay(SCAN_DELAY_MS); continue; }

                    const currentTs = candles[candles.length - 1].time;
                    // evita re-alertar no mesmo candle para o mesmo ativo
                    if (lastSignalTimestamps[symbol] === currentTs) { await delay(SCAN_DELAY_MS); continue; }

                    const result = analyzeSignal(candles);
                    if (!result) { await delay(SCAN_DELAY_MS); continue; }

                    if (result.isLong === true || result.isLong === false) {
                        const dir = result.isLong ? 'LONG 🟢' : 'SHORT 🔴';
                        const setupLbl = result.isLong ? 'Rompimento da retomada' : 'Continuação vendedora';
                        const trendLbl = result.isLong ? 'Tendência Alta' : 'Tendência Baixa';
                        const bonusLbl = result.rsiBonus ? ` | IFR ${result.isLong ? 'reagindo' : 'caindo'}` : '';
                        log(`🚀 ${symbol} — ${dir} | SMC Pullback | ${trendLbl} | ${setupLbl} | Retração ${result.retracePct}%${bonusLbl} | TP: ${result.tpPrice.toFixed(6)} | SL: ${result.slPrice.toFixed(6)}`);
                        showSignalCard(result.isLong, symbol, result.price, result.rsi, result.tpPrice, result.slPrice, result.candle);
                        playAlert(result.isLong);
                        lastSignalTimestamps[symbol] = currentTs;
                        found++;

                        const bankInput = document.getElementById('bankValue').value;
                        const bank = (bankInput && Number(bankInput) > 0) ? Number(bankInput) : 100;
                        const tgMsg = buildTelegramMsg(result.isLong, symbol, result.price, result.rsi, result.tpPrice, result.slPrice, result.candle, result.rsiBonus, result.retracePct, bank);
                        sendTelegram(tgMsg)
                            .then(() => log(`📬 Sinal de ${symbol} enviado para o Telegram!`))
                            .catch(err => log(`⚠️ Telegram erro (${symbol}): ${err.message}`));
                    }

                    await delay(SCAN_DELAY_MS);
                }

                if (isRunning) {
                    const hora = new Date().toLocaleTimeString('pt-BR');
                    updateStatus(`🟢 Ativo — ${allSymbols.length} ativos | Última varredura: ${hora}`);
                    log(`✅ Varredura concluída — ${allSymbols.length} ativos | Sinais encontrados: ${found}`);
                }
            } catch (err) {
                log(`❌ Erro: ${err.message}`);
            } finally {
                isScanning = false;
            }
        }

        // ── Controles ────────────────────────────────────────────────────────────
        function setBtnState(running) {
            document.getElementById('start-btn').disabled = running;
            document.getElementById('stop-btn').disabled = !running;
        }

        function startBot() {
            isRunning = true;
            setBtnState(true);
            updateStatus('🟢 Ativo — iniciando varredura...');
            log('▶️ Bot iniciado! Monitorando todos os ativos USDT (1H) — SMC Pullback Strategy.');
            checkSignal();
            botInterval = setInterval(checkSignal, checkInterval);
            showSnackbar('Bot iniciado!');
        }

        function stopBot() {
            isRunning = false;
            clearInterval(botInterval);
            botInterval = null;
            isScanning = false;
            lastSignalTimestamps = {};
            allSymbols = [];
            setBtnState(false);
            hideSignalCard();
            updateStatus('🔴 Parado');
            log('⏹️ Bot parado.');
            showSnackbar('Bot parado!');
        }

        function checkNow() {
            if (!isRunning) { showSnackbar('Inicie o bot primeiro.'); return; }
            log('🔄 Forçando verificação...');
            lastSignalTimestamps = {};
            checkSignal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setBtnState(false);
            updateStatus('✅ Pronto para iniciar!');
            log('📊 Bot carregado. Estratégia: SMC Pullback — HH/HL + EMA21 + Pullback 30–65% + Rompimento (1H)');
            log('ℹ️  LONG : Tendência Alta (HH/HL) | Pullback 30–65% | Rompe máxima do candle anterior');
            log('ℹ️  SHORT: Tendência Baixa (LH/LL) | Pullback 30–65% | Rompe mínima do candle anterior');
            log('📐 TP = BB oposta / RR 2:1 | SL = Fundo/Topo do pullback');
        });
    </script>
